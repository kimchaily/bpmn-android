name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # GitHub-hosted ubuntu runners ship with the Android SDK preinstalled
      # (ANDROID_HOME / ANDROID_SDK_ROOT are set), so no SDK install is needed.

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      # The native project is not committed; regenerate it from
      # capacitor.config.json, then sync web assets + plugins into it.
      - name: Generate Android project
        run: |
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpmn-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
