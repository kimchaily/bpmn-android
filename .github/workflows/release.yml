name: Release Android APK

# Builds a signed release APK and publishes it as a GitHub Release.
# Trigger by pushing a tag like `v1.0.0`, or run manually (workflow_dispatch)
# with a version. Requires the signing secrets documented in RELEASING.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version name, e.g. 1.0.0 (defaults to package.json version)"
        required: false

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure signing secrets are present
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE" ]; then
            echo "::error::Missing signing secrets. Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS and ANDROID_KEY_PASSWORD (see RELEASING.md)."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Generate Android project + app icon
        run: |
          npx cap add android
          npx cap sync android
          npx @capacitor/assets@3 generate --android

      - name: Resolve version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"
          fi

      - name: Stamp version into the Android project
        run: |
          sed -i "s/versionName \"[^\"]*\"/versionName \"${APP_VERSION}\"/" android/app/build.gradle
          sed -i "s/versionCode [0-9]\+/versionCode ${GITHUB_RUN_NUMBER}/" android/app/build.gradle
          grep -E "versionName|versionCode" android/app/build.gradle

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Name the APK
        run: cp android/app/build/outputs/apk/release/app-release.apk "bpmn-android-${APP_VERSION}.apk"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" "bpmn-android-${APP_VERSION}.apk" \
            --title "BPMN Android ${APP_VERSION}" \
            --generate-notes

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpmn-android-release
          path: bpmn-android-${{ env.APP_VERSION }}.apk
          if-no-files-found: error
